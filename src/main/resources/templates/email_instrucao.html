<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
          name="viewport">
    <meta content="ie=edge" http-equiv="X-UA-Compatible">
    <title>Notificação de Instrução</title>
    <style>
        body {
    margin: 0;
    padding: 0;
    background-color: #f2f4f7;
    font-family: Arial, sans-serif;
}
.email-wrapper {
    background-color: #f2f4f7;
    padding: 20px 0;
}
.email-container {
    background-color: #ffffff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 14px rgba(0,0,0,0.1);
    width: 600px;
}
.email-header {
    background: linear-gradient(135deg, #005bea, #00c6fb);
    padding: 25px;
    text-align: center;
}
.email-header img {
    display: block;
    margin: 0 auto 10px auto;
}
.email-header h1 {
    color: #ffffff;
    margin: 0;
    font-size: 26px;
    letter-spacing: 1px;
}
.email-header p {
    color: #e8f6ff;
    margin: 5px 0 0 0;
    font-size: 14px;
}
.main-image {
    width: 100%;
    display: block;
}
.content {
    padding: 30px;
}
.content h2 {
    color: #333333;
    margin-top: 0;
    font-size: 22px;
}
.content p {
    font-size: 15px;
    color: #555555;
    line-height: 1.6;
}
.data-table {
    background-color: #f8fafc;
    border-radius: 8px;
    margin-top: 15px;
    width: 100%;
}
.data-table td {
    font-size: 14px;
    color: #555;
    padding: 10px;
}
.button-container {
    text-align: center;
    margin-top: 30px;
}
.button-container a {
    background-color: #005bea;
    color: white;
    padding: 12px 24px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 16px;
    display: inline-block;
}
.footer {
    background-color: #f0f3f7;
    text-align: center;
    padding: 20px;
    border-top: 1px solid #e0e6ed;
}
.footer p {
    font-size: 12px;
    color: #7a8793;
    margin: 0;
}
.footer-icons img {
    width: 22px;
    vertical-align: middle;
    margin: 0 8px;
}
    </style>
</head>
<body>
<table border="0"
       cellpadding="0"
       cellspacing="0"
       class="email-wrapper"
       width="100%">
    <tr>
        <td align="center">
            <table border="0"
                   cellpadding="0"
                   cellspacing="0"
                   class="email-container">
                <tr>
                    <td class="email-header">
                        <img alt="logo"
                             src="https://cdn-icons-png.flaticon.com/512/2972/2972149.png"
                             width="80">
                        <h1>Auto Escola N-116</h1>
                        <p>Sistema de Notificações Automáticas</p>
                    </td>
                </tr>

                <tr>
                    <td>
                        <img alt="Instrutor e aluno"
                             class="main-image"
                             src="https://png.pngtree.com/png-vector/20191022/ourlarge/pngtree-man-in-driving-school-vector-training-car-successful-pass-exam-learning-png-image_1841795.jpg">
                    </td>
                </tr>
                <tr>
                    <td class="content">
                        <h2>
                            Nova instrução <span th:text="${acao}"></span>
                        </h2>
                        <p>
                            Uma nova instrução foi
                            <strong th:text="${acao}"></strong>
                            no sistema. Aqui estão os detalhes:
                        </p>
                        <table class="data-table">
                            <tr>
                                <td><strong>ID:</strong> <span th:text="${id}"></span></td>
                            </tr>
                            <tr>
                                <td><strong>Aluno:</strong> <span th:text="${aluno}"></span></td>
                            </tr>
                            <tr>
                                <td><strong>Instrutor:</strong> <span th:text="${instrutor}"></span></td>
                            </tr>
                            <tr>
                                <td><strong>Data:</strong> <span th:text="${data}"></span></td>
                            </tr>
                        </table>
                        <div class="button-container">
                            <a th:href="'https://autoescolan116.com.br/instrucao/' + ${id}">
                                Ver instrução no sistema
                            </a>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td class="footer">
                        <p>
                            2026 Auto Escola N-116 - Todos os direitos reservados.<br>
                            Esta é uma mensagem automática. Por favor, não responda.
                        </p>
                        <p class="footer-icons">
                            <img src="https://cdn-icons-png.flaticon.com/512/561/561127.png">
                            <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png">
                            <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
